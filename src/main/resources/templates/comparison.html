<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common_head('ITEAC - Comparison')}"></head>
<body class="light-theme">
<header th:replace="~{fragments/layout :: navbar}"></header>

<div class="file-page-wrapper">
    <div class="file-details-card">
        <h2>Version Comparison</h2>
        <p>Comparing changes between the selected versions.</p>
        <hr class="section-divider">

        <!-- Тук JS ще напълни разликите -->
        <div id="diff-content" style="font-family: monospace; white-space: pre-wrap; background: #24292e; color: white; padding: 20px; border-radius: 10px;">
            Loading comparison...
        </div>

        <a href="javascript:history.back()" class="nav-btn" style="margin-top: 20px;">Back to Document</a>
    </div>
</div>

<script th:inline="javascript">
    // Този скрипт се изпълнява веднага при зареждане на страницата
    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const v1 = urlParams.get('v1');
        const v2 = urlParams.get('v2');

        const response = await fetch('/versions/compare', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ oldVersionId: v1, newVersionId: v2 })
        });
        const data = await response.json();

        const container = document.getElementById('diff-content');
        container.innerHTML = '';

        data.forEach(line => {
            const div = document.createElement('div');
            div.textContent = (line.type === 'INSERT' ? '+ ' : line.type === 'DELETE' ? '- ' : '  ') + line.text;

            if (line.type === 'INSERT') div.style.color = '#79ffad'; // Зелено
            if (line.type === 'DELETE') div.style.color = '#ff8585'; // Червено

            container.appendChild(div);
        });
    });
</script>
</body>
</html>
