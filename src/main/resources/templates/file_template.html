<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: common_head('ITEAC - Document Details')}"></head>

<body class="light-theme">

<header th:replace="~{fragments/layout :: navbar}"></header>

<div class="file-page-wrapper">

    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="glass-card file-details-card">

        <header class="file-header">
            <h1 class="file-title" th:text="${document.title}">Project_Proposal_v2.pdf</h1>

            <div style="display: flex; gap: 10px; align-items: center;">

                <a th:if="${document.activeVersion != null and document.activeVersion.status.name() == 'APPROVED'}"
                   th:href="@{/document/{id}/export/pdf(id=${document.id})}"
                   class="action-btn revert"
                   style="text-decoration: none;"
                   sec:authorize="hasAnyAuthority('ROLE_AUTHOR', 'ROLE_ADMIN')">
                    Export PDF
                </a>


                <form th:action="@{/document/{id}/delete(id=${document.id})}" method="post" style="display:inline;"
                      sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_AUTHOR')"
                      onsubmit="return confirm('Are you sure you want to delete this document?');">
                    <button type="submit" style="background: none; border: none; padding: 0; cursor: pointer;">
                        <svg class="trash-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"
                                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M10 11v6m4-6v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                  stroke-linejoin="round" />
                        </svg>
                    </button>
                </form>
            </div>
        </header>

        <div class="file-info-block">
            <div class="file-preview">
                <div class="file-icon-placeholder">DOC</div>
            </div>
            <div class="file-description">
                <h3>Current Content</h3>
                <p th:text="${document.activeVersion != null ? document.activeVersion.content : 'No active content available'}">
                    Document content goes here...
                </p>
            </div>
        </div>

        <div class="section-divider"></div>


        <div class="comparison-section" style="margin-bottom: 30px; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="margin-bottom: 15px;">Compare Two Versions</h3>
            <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
                <div class="input-group" style="margin-bottom: 0;">
                    <label>Base Version (Old):</label>
                    <select id="oldVersionId" class="nav-btn" style="width: 220px; background: white; color: #333;">
                        <option value="" disabled selected>Select version</option>
                        <option th:each="v : ${document.versions}" th:value="${v.id}"
                                th:text="'v' + ${v.versionNumber} + ' (' + ${v.status} + ')'"></option>
                    </select>
                </div>
                <div class="input-group" style="margin-bottom: 0;">
                    <label>Compare With (New):</label>
                    <select id="newVersionId" class="nav-btn" style="width: 220px; background: white; color: #333;">
                        <option value="" disabled selected>Select version</option>
                        <option th:each="v : ${document.versions}" th:value="${v.id}"
                                th:text="'v' + ${v.versionNumber} + ' (' + ${v.status} + ')'"></option>
                    </select>
                </div>
                <button onclick="compareSelectedVersions()" class="cta-btn" style="height: 42px;">Compare Now</button>
            </div>


            <div id="diff-container" class="hidden">
                <div class="diff-header">Visual Diff Results:</div>
                <div id="diff-results"></div>
            </div>
        </div>

        <div class="section-divider"></div>


        <div class="file-versions-block">
            <h3>Version History</h3>
            <table class="version-table">
                <thead>
                <tr>
                    <th>Version</th>
                    <th>Created At</th>
                    <th>Status</th>
                    <th>Author</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="version : ${document.versions}">
                    <td th:text="'v' + ${version.versionNumber}">v1</td>
                    <td th:text="${#temporals.format(version.createdAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                    <td>
                                <span th:class="'status-tag '
                                    + (${version.status.name() == 'DRAFT'} ? 'status-draft' : '')
                                    + (${version.status.name() == 'PENDING_REVIEW'} ? 'status-pending' : '')
                                    + (${version.status.name() == 'APPROVED'} ? 'status-approved' : '')
                                    + (${version.status.name() == 'REJECTED'} ? 'status-rejected' : '')"
                                      th:text="${#strings.replace(version.status.name(), '_', ' ')}">DRAFT</span>
                    </td>
                    <td th:text="${version.author != null ? version.author.username : 'Unknown'}">Author</td>
                    <td>

                        <form th:if="${version.status.name() == 'DRAFT'}"
                              th:action="@{/document/{docId}/version/{vId}/status(docId=${document.id},vId=${version.id})}"
                              method="post" style="display:inline;"
                              sec:authorize="hasAnyAuthority('ROLE_AUTHOR','ROLE_REVIEWER','ROLE_ADMIN')">
                            <input type="hidden" name="newStatus" value="PENDING_REVIEW"/>
                            <button type="submit" class="action-btn submit-review">Review</button>
                        </form>

                        <form th:if="${version.status.name() == 'PENDING_REVIEW'}"
                              th:action="@{/document/{docId}/version/{vId}/status(docId=${document.id},vId=${version.id})}"
                              method="post" style="display:inline;"
                              sec:authorize="hasAnyAuthority('ROLE_REVIEWER','ROLE_ADMIN')">
                            <input type="hidden" name="newStatus" value="APPROVED"/>
                            <button type="submit" class="action-btn approve">Approve</button>
                        </form>

                        <form th:if="${version.status.name() == 'PENDING_REVIEW'}"
                              th:action="@{/document/{docId}/version/{vId}/status(docId=${document.id},vId=${version.id})}"
                              method="post" style="display:inline;"
                              sec:authorize="hasAnyAuthority('ROLE_REVIEWER','ROLE_ADMIN')">
                            <input type="hidden" name="newStatus" value="REJECTED"/>
                            <button type="submit" class="action-btn delete">Reject</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>


        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button class="cta-btn" onclick="openNewVersionModal()" sec:authorize="isAuthenticated()">+ New Version</button>
            <button class="action-btn submit-review" onclick="openShareModal()" sec:authorize="isAuthenticated()">Share Document</button>
        </div>
    </div>
</div>

<div id="shareModal" class="modal-backdrop" style="display:none;">
    <div class="modal-content">
        <h2>Share Document</h2>
        <form th:action="@{/document/{id}/share(id=${document.id})}" method="post">
            <input type="text" name="emailOrUsername" placeholder="Username or email" required class="nav-btn" style="width:100%; margin: 15px 0;"/>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button type="button" onclick="closeShareModal()" class="action-btn revert">Cancel</button>
                <button type="submit" class="action-btn approve">Share</button>
            </div>
        </form>
    </div>
</div>

<div id="newVersionModal" class="modal-backdrop" style="display:none;">
    <div class="modal-content" style="max-width: 700px;">
        <h2>Create New Version</h2>
        <form th:action="@{/document/{id}/version/new(id=${document.id})}" method="post">
                <textarea name="content" rows="12" th:text="${document.activeVersion != null ? document.activeVersion.content : ''}"
                          style="width:100%; margin: 15px 0; padding: 10px; border-radius: 8px; font-family: monospace;"></textarea>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button type="button" onclick="closeNewVersionModal()" class="action-btn revert">Cancel</button>
                <button type="submit" class="action-btn approve">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/javascript_index.js}"></script>
<script>
    function openShareModal() { document.getElementById('shareModal').style.display = 'flex'; }
    function closeShareModal() { document.getElementById('shareModal').style.display = 'none'; }
    function openNewVersionModal() { document.getElementById('newVersionModal').style.display = 'flex'; }
    function closeNewVersionModal() { document.getElementById('newVersionModal').style.display = 'none'; }

    window.onclick = function(event) {
        if (event.target.className === 'modal-backdrop') {
            event.target.style.display = 'none';
        }
    }
</script>
</body>
</html>
