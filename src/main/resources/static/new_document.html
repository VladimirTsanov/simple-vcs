<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Document - SimpleVCS</title>
</head>

<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <h1>New Document</h1>
    <p>Create a new document</p>
    <div id="create-document-container">

        <form id="doc-create-form" onsubmit="createDocument(event)">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>
            <br>
            <label for="content">Content:</label>
            <textarea id="content" name="content" required rows="10" cols="50"></textarea>
            <br>
            <button type="submit">Create Document</button>
        </form>

    </div>

    <a href="/my_documents.html">Back to my documents</a>
    <a href="/">Back to home</a>
</body>
<script src="createDoc.js"></script>

</html>
